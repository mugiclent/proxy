server {
    listen 80;
    server_name katisha.online www.katisha.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name katisha.online;

    ssl_certificate     /etc/letsencrypt/live/katisha.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/katisha.online/privkey.pem;

    location / {
        set $upstream http://www:3000;
        proxy_pass $upstream;
    }
}

server {
    listen 443 ssl;
    server_name www.katisha.online;

    ssl_certificate     /etc/letsencrypt/live/www.katisha.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.katisha.online/privkey.pem;

    location / {
        set $upstream http://www:3000;
        proxy_pass $upstream;
    }
}
