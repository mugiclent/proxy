server {
    listen 80;
    server_name cdn.katisha.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name cdn.katisha.online;

    ssl_certificate     /etc/letsencrypt/live/cdn.katisha.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cdn.katisha.online/privkey.pem;

    # Allow document/logo uploads (presigned PUT) to pass through.
    client_max_body_size 20m;

    location / {
        set $upstream http://cdn:8333;
        proxy_pass $upstream;

        # Presigned URLs (PUT uploads + private-bucket GET) are SigV4-signed for the
        # public host. SeaweedFS (domainName=cdn.katisha.online) validates the
        # signature against the Host it receives, so the original Host MUST be
        # preserved or every presigned request fails with SignatureDoesNotMatch.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
