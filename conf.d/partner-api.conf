server {
    listen 80;
    server_name partner-api.katisha.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name partner-api.katisha.online;

    ssl_certificate     /etc/letsencrypt/live/partner-api.katisha.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/partner-api.katisha.online/privkey.pem;

    # Same api-gw as api.katisha.online — this is purely a second host so the
    # operator portal's auth cookie is host-bound to partner-api and never sent
    # to api.katisha.online (and vice versa). Browser-enforced portal isolation.

    # SSE: wallet top-up status stream — disable buffering so events reach the client immediately
    location ~ ^/api/v1/users/me/wallet/topup/.+/stream$ {
        set $upstream http://api-gw:8090;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    location / {
        set $upstream http://api-gw:8090;
        proxy_pass $upstream;
    }
}
