server {
    listen 80;
    server_name rabbitmq.katisha.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name rabbitmq.katisha.online;

    ssl_certificate     /etc/letsencrypt/live/rabbitmq.katisha.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rabbitmq.katisha.online/privkey.pem;

    location / {
        set $upstream http://rabbitmq:15672;
        proxy_pass $upstream;
    }
}
