server {
    listen 80;
    server_name vault.katisha.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name vault.katisha.online;

    ssl_certificate     /etc/letsencrypt/live/vault.katisha.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vault.katisha.online/privkey.pem;

    location / {
        # Variable makes nginx resolve per-request — nginx starts even if
        # infisical is not running. It comes online automatically once it does.
        set $upstream http://infisical:8080;
        proxy_pass $upstream;
    }
}
