server {
    listen 80;
    server_name telemetry.katisha.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name telemetry.katisha.online;

    ssl_certificate     /etc/letsencrypt/live/telemetry.katisha.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/telemetry.katisha.online/privkey.pem;

    # Routed STRAIGHT to the telemetry container — bypasses api-gw, so this whole
    # host is unauthenticated by design (bus devices can't carry a JWT).

    # SSE: live position stream — disable buffering so fixes reach the map immediately,
    # and hold the connection open.
    location ~ ^/buses/.+/stream$ {
        set $upstream http://telemetry-svc:8093;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection '';      # override global "upgrade"; SSE is not a websocket
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # Ingest (POST /) + latest read (GET /buses/:id/location).
    location / {
        set $upstream http://telemetry-svc:8093;
        proxy_pass $upstream;
    }
}
